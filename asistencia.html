<!DOCTYPE html>
<html lang="es">
<head>
    <title>Asistencia Iglesia Buena Vista</title>
</head>
<body>
    <h1>Asistencia del servicio</h1>
    <p>Total: <span id="contador">0</span></p>
    <h3>Fecha: 11 / Marzo / 2026</h3>

    <button id="btnAgregar">+ Agregar persona</button>
    <button id="btnRestar">- Quitar persona</button>
    <button id="btnReset">Resetear</button>
    <input id="nombreServicio" type="text" placeholder="Ej: Servicio dominical">
    <button id="btnGuardarNombre">Guardar</button>
    <p>Servicio: <span id="displayNombre">Sin nombre</span></p>

    <script>
        const display = document.getElementById("contador")
        const btnAgregar = document.getElementById("btnAgregar")
        const btnRestar = document.getElementById("btnRestar")
        const btnReset = document.getElementById("btnReset")
        const inputNombre = document.getElementById("nombreServicio")
        const btnGuardarNombre = document.getElementById("btnGuardarNombre")
        const displayNombre = document.getElementById("displayNombre")

        async function cargarAsistencia() {
            const respuesta = await fetch("http://127.0.0.1:8000/asistencia")
            const datos = await respuesta.json()
            display.textContent = datos.total
            colorUpdate(datos.total)
        }

        btnAgregar.addEventListener("click", async function() {
            const respuesta = await fetch("http://127.0.0.1:8000/asistencia/agregar", {
                method: "POST"
            })
            const datos = await respuesta.json()
            display.textContent = datos.total
            colorUpdate(datos.total)
        })

        btnRestar.addEventListener("click", async function() {
            const respuesta = await fetch("http://127.0.0.1:8000/asistencia/restar", {
                method: "POST"
            })
            const datos = await respuesta.json()
            display.textContent = datos.total
            colorUpdate(datos.total)
        })

        btnReset.addEventListener("click", async function() {
            const respuesta = await fetch("http://127.0.0.1:8000/asistencia/resetear", {
                method: "POST"
            })
            const datos = await respuesta.json()
            display.textContent = datos.total
            colorUpdate(datos.total)
        })

        btnGuardarNombre.addEventListener("click", function() {
            displayNombre.textContent = inputNombre.value
        })

        function colorUpdate(total) {
            if (total < 50) {
                display.style.color = "red"
            } else if (total >= 50 && total <= 150) {
                display.style.color = "yellow"
            } else {
                display.style.color = "green"
            }
        }

        cargarAsistencia()
    </script>
</body>
</html>
