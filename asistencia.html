<!DOCTYPE html>
<html lang="es">
<head>
    <title>Asistencia Iglesia Buena Vista</title>
</head>
<body>
    <h1>Asistrencia del servicio</h1>
    <p>Total: <span id="contador">0</span></p>
    <h3>Fecha: 11 / Marzo / 2026</h3>

    <button id="btnAgregar">+ Agregar persona</button>
    <button id="btnRestar">- Quitar persona</button>
    <button id="btnReset">Resetear</button>

    <script>
        let contador = 0
        const display = document.getElementById("contador")
        const btnAgregar = document.getElementById("btnAgregar")
        const btnRestar = document.getElementById("btnRestar")
        const btnReset = document.getElementById("btnReset")

        btnAgregar.addEventListener("click", function(){
            if(contador >= 200){
                alert("Se llego a la capacidad maxima!")
                btnAgregar.disabled = true
                return
            }
            contador++
            display.textContent = contador
            colorUpdate()
        })

        btnRestar.addEventListener("click", function(){
            if (contador > 0){
                contador--
                display.textContent = contador
                colorUpdate()
            }
        })

        btnReset.addEventListener("click", function(){
            contador = 0
            display.textContent = contador
            colorUpdate()
        })

        function colorUpdate(){
            if (contador < 50){
                display.style.color = "red"
            }
            else if (contador >= 50 && contador <= 150){
                display.style.color = "yellow"
            }
            else{
                display.style.color = "green"
            }
        }
    </script>
</body>
</html>
